services:
  backend-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mollmart}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - '${POSTGRES_PORT:-54320}:5432'
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mollmart}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6380}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4040
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@backend-postgres:5432/${POSTGRES_DB:-mollmart}?schema=public
      REDIS_URL: redis://backend-redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-shared-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-shared-refresh-secret}
      SERVER_URL: ${SERVER_URL:-http://localhost:4040}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - '4040:4040'
    depends_on:
      backend-postgres:
        condition: service_healthy
      backend-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_postgres_data:
