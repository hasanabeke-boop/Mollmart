services:
  notification-service:
    build:
      context: .
    ports:
      - '4100:4100'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5440:5432'
    volumes:
      - notification_service_postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  notification_service_postgres:
